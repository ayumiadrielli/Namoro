<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffe6e6, #ffccd5);
  overflow: hidden;
}

/* Corações */
.heart {
  position: absolute;
  color: rgba(255, 77, 109, 0.6);
  font-size: 20px;
  animation: subir 6s linear infinite;
}

@keyframes subir {
  0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
}

/* Container */
.container {
  width: 500px;
  margin: 80px auto;
  background: white;
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  position: relative;
  z-index: 2;

  animation: aparecer 1.5s ease;
}

@keyframes aparecer {
  from { opacity: 0; transform: translateY(50px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Brilho animado */
.container::before {
  content: "";
  position: absolute;
  top: -2px;
  left: -2px;
  right: -2px;
  bottom: -2px;
  background: linear-gradient(45deg, #ff4d6d, #ff9a9e, #ff4d6d);
  z-index: -1;
  border-radius: 20px;
  filter: blur(10px);
  opacity: 0.5;
  animation: brilho 4s linear infinite;
}

@keyframes brilho {
  0% { filter: blur(10px) hue-rotate(0deg); }
  100% { filter: blur(10px) hue-rotate(360deg); }
}

h1 {
  color: #ff4d6d;
}

/* Botão */
.btn {
  background: linear-gradient(45deg, #ff4d6d, #ff758f);
  color: white;
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-size: 16px;
  margin-top: 20px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #ff4d6d;
}

/* Foto */
.foto {
  display: none;
  margin-top: 20px;
  animation: aparecer 1s ease;
}

.foto img {
  width: 50%;
  border-radius: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Fogos */
.firework {
  position: absolute;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #ff4d6d;
  animation: explode 2s infinite;
}

@keyframes explode {
  0% { transform: scale(0); opacity: 1; }
  100% { transform: scale(6); opacity: 0; }
}
</style>
</head>

<body>

<!-- Fogos -->
<div class="firework" style="top:20%; left:30%;"></div>
<div class="firework" style="top:40%; left:70%; animation-delay:1s;"></div>
<div class="firework" style="top:60%; left:50%; animation-delay:0.5s;"></div>

<div class="container">
  <h1>❤️ Oi, meu amor ❤️</h1>

  <p>
    Eu fiz esse site só pra te lembrar o quanto você é especial pra mim 💕<br><br>
    Cada momento ao seu lado é incrível e eu sou muito feliz por ter você na minha vida, Mikael.
  </p>

  <p style="font-size:18px; color:#ff4d6d; font-weight:bold;">
    Eu te amo muito! 💖
  </p>

  <button class="btn" onclick="mostrarFoto()">Clique aqui ❤️</button>

  <div class="foto" id="foto">
    <img src="site.jpeg" alt="Nosso amor">
  </div>

  <p style="margin-top:20px; font-size:14px; color:#777;">
    Com carinho, <br> Ayumi ❤️
  </p>
</div>

<script>
/* Gerar vários corações */
function criarCoracao() {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (15 + Math.random() * 20) + "px";
  heart.style.animationDuration = (4 + Math.random() * 4) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 8000);
}

setInterval(criarCoracao, 300);

/* Mostrar foto */
function mostrarFoto() {
  document.getElementById("foto").style.display = "block";
}
</script>

</body>
</html>
